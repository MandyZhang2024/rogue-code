<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rogue-code.com · 已上线</title>
<meta name="description" content="rogue-code.com is live.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%91%BE%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0a0b10; --panel:#12141c; --line:#232636;
    --fg:#e7e9f0; --muted:#8b90a6; --accent:#7c6cff; --green:#3ecf8e; --pink:#ff6b9d;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:
      radial-gradient(1200px 600px at 50% -10%, rgba(124,108,255,.14), transparent 60%),
      var(--bg);
    color:var(--fg);
    font:400 16px/1.6 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    display:grid; place-items:center; padding:24px;
  }
  .wrap{width:100%; max-width:620px}
  .term{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    box-shadow:0 24px 60px -20px rgba(0,0,0,.7); overflow:hidden;
  }
  .bar{
    display:flex; align-items:center; gap:8px; padding:12px 16px;
    border-bottom:1px solid var(--line); background:rgba(255,255,255,.02);
  }
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .bar .host{margin-left:8px; color:var(--muted); font:500 13px/1 ui-monospace,SFMono-Regular,Menlo,monospace}
  .body{padding:32px 28px 30px}
  .prompt{font:500 14px/1.7 ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--muted); margin:0 0 18px}
  .prompt .c{color:var(--green)} .prompt .p{color:var(--accent)}
  h1{
    margin:0 0 6px; font-size:clamp(30px,7vw,46px); font-weight:750; letter-spacing:-.02em;
    background:linear-gradient(100deg,#fff, #b9b2ff 55%, var(--accent));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  h1 .wave{-webkit-text-fill-color:initial; color:initial}
  .lead{margin:0 0 22px; color:var(--muted); font-size:15px}
  .lead b{color:var(--fg); font-weight:600}
  .badges{display:flex; flex-wrap:wrap; gap:8px; margin:0 0 26px}
  .badge{
    display:inline-flex; align-items:center; gap:6px; padding:6px 11px; border-radius:999px;
    border:1px solid var(--line); background:rgba(255,255,255,.02);
    font:600 12.5px/1 ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--muted);
  }
  .badge .k{width:7px;height:7px;border-radius:50%}
  .note{
    margin:0; padding:14px 16px; border-left:2px solid var(--accent); border-radius:0 8px 8px 0;
    background:rgba(124,108,255,.07); color:#c9ccdb; font-size:14.5px;
  }
  .note code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--green)}
  .foot{margin:18px 2px 0; color:var(--muted); font-size:12.5px; text-align:center}
  .cursor{display:inline-block;width:9px;height:1.05em;vertical-align:-2px;background:var(--green);
    margin-left:4px;animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  @media (prefers-reduced-motion:reduce){.cursor{animation:none}}
</style>
</head>
<body>
  <main class="wrap">
    <div class="term">
      <div class="bar">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span class="host">zm@rogue-code.com : ~</span>
      </div>
      <div class="body">
        <p class="prompt"><span class="p">➜</span> <span class="c">curl</span> https://rogue-code.com</p>
        <h1><span class="wave">👋</span> Hello, World</h1>
        <p class="lead"><b>rogue-code.com</b> 已上线，域名与网站全部就绪。<span class="cursor"></span></p>
        <div class="badges">
          <span class="badge"><span class="k" style="background:var(--green)"></span>DNS 已解析</span>
          <span class="badge"><span class="k" style="background:var(--accent)"></span>HTTPS 已加密</span>
          <span class="badge"><span class="k" style="background:var(--pink)"></span>CDN 已加速</span>
        </div>
        <p class="note">这是一个占位首页 —— 服务器、域名、证书都配好了，<b>接下来就等你把真正的内容放上来</b>。<br>更新方式：把网页文件放进服务器的 <code>/var/www/rogue-code</code> 即生效。</p>
        <p class="foot">served over TLS · Cloudflare + Vultr · 与 3pz.com 同机共存</p>
      </div>
    </div>
  </main>
</body>
</html>
